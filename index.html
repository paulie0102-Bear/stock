<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>資產管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 處理 iOS/Android 安全區域 */
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        body { padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
        .page { display: none; position: fixed; inset: 0; background: white; z-index: 50; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
        .page.active { display: block; overflow-y: auto; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <div id="main-hub" class="min-h-screen flex flex-col p-6 active">
        <header class="mt-8 mb-10">
            <h1 class="text-3xl font-black text-gray-800">Hi, 投資者</h1>
            <p class="text-gray-500">掌握今日的資產動態</p>
        </header>

        <div class="space-y-4">
            <button onclick="showPage('stock-menu-page')" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between active:bg-gray-50">
                <div class="flex items-center">
                    <div class="bg-blue-500 p-4 rounded-2xl text-white mr-4"><i class="fas fa-chart-pie"></i></div>
                    <div class="text-left"><p class="font-bold text-lg">股票儀表板</p><p class="text-xs text-gray-400">即時行情與技術指標</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </button>

            <button onclick="showPage('portfolio-page')" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between active:bg-gray-50">
                <div class="flex items-center">
                    <div class="bg-emerald-500 p-4 rounded-2xl text-white mr-4"><i class="fas fa-layer-group"></i></div>
                    <div class="text-left"><p class="font-bold text-lg">個人持股</p><p class="text-xs text-gray-400">目前庫存損益明細</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </button>

            <button onclick="showPage('asset-page')" class="w-full bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex items-center justify-between active:bg-gray-50">
                <div class="flex items-center">
                    <div class="bg-indigo-500 p-4 rounded-2xl text-white mr-4"><i class="fas fa-wallet"></i></div>
                    <div class="text-left"><p class="font-bold text-lg">個人資產</p><p class="text-xs text-gray-400">總資產配置與快照</p></div>
                </div>
                <i class="fas fa-chevron-right text-gray-300"></i>
            </button>
        </div>
    </div>

    <div id="stock-menu-page" class="page px-6">
        <header class="flex items-center py-4 mb-6">
            <button onclick="hidePage('stock-menu-page')" class="p-2 -ml-2 text-gray-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold ml-2">選擇市場</h2>
        </header>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="showPage('tw-stock-page')" class="aspect-square bg-orange-50 rounded-3xl flex flex-col items-center justify-center border border-orange-100">
                <span class="text-4xl mb-2">🇹🇼</span><span class="font-bold text-orange-800">台股</span>
            </button>
            <button onclick="alert('美股開發中')" class="aspect-square bg-blue-50 rounded-3xl flex flex-col items-center justify-center border border-blue-100 text-blue-800">
                <span class="text-4xl mb-2">🇺🇸</span><span class="font-bold">美股</span>
            </button>
        </div>
    </div>

    <div id="tw-stock-page" class="page px-6">
        <header class="flex items-center py-4 mb-4 border-b">
            <button onclick="hidePage('tw-stock-page')" class="p-2 -ml-2 text-gray-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold ml-2">台股行情</h2>
        </header>
        
        <div id="tw-stock-content" class="text-center py-20 text-gray-400 italic">
            目前無數據，請點擊下方 + 新增查詢
        </div>

        <button onclick="openModal('add-stock-modal')" class="fixed bottom-10 right-8 bg-blue-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl active:scale-90 transition-transform" style="bottom: calc(2.5rem + var(--safe-bottom));">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="portfolio-page" class="page px-6">
        <header class="flex items-center py-4 mb-4 border-b">
            <button onclick="hidePage('portfolio-page')" class="p-2 -ml-2 text-gray-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold ml-2">個人持股</h2>
        </header>
        <p class="text-center py-10 text-gray-400">數據載入中...</p>
    </div>

    <div id="asset-page" class="page px-6">
        <header class="flex items-center py-4 mb-4 border-b">
            <button onclick="hidePage('asset-page')" class="p-2 -ml-2 text-gray-400"><i class="fas fa-arrow-left"></i></button>
            <h2 class="text-xl font-bold ml-2">個人資產</h2>
        </header>
        <div class="bg-gray-100 h-40 rounded-3xl flex items-center justify-center text-gray-400 mb-6">資產佔比圓餅圖</div>
        <button class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold">📸 紀錄今日快照</button>
    </div>

    <div id="add-stock-modal" class="modal px-6">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div class="bg-blue-600 p-6 text-white text-center">
                <i class="fas fa-search text-3xl mb-2"></i>
                <h3 class="text-lg font-bold">新增查詢標的</h3>
            </div>
            <div class="p-6">
                <label class="block text-sm text-gray-500 mb-2">股票代號</label>
                <input id="stock-input" type="text" placeholder="例如: 2330" class="w-full bg-gray-100 border-none rounded-xl p-4 text-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <div class="flex gap-3 mt-6">
                    <button onclick="closeModal('add-stock-modal')" class="flex-1 py-3 text-gray-400 font-bold">取消</button>
                    <button onclick="submitStock()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">確認送出</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showPage(id) {
            document.getElementById(id).classList.add('active');
        }
        function hidePage(id) {
            document.getElementById(id).classList.remove('active');
        }
        function openModal(id) {
            document.getElementById(id).classList.add('active');
            document.getElementById('stock-input').focus();
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        // 送出股票代號的邏輯
        function submitStock() {
            const stockId = document.getElementById('stock-input').value;
            if (!stockId) return alert('請輸入代號');
            
            // 這裡未來會接 Google Apps Script
            alert('已送出代號: ' + stockId + '\n系統正在填入試算表...');
            
            closeModal('add-stock-modal');
            document.getElementById('stock-input').value = '';
        }
    </script>
</body>
</html>
